<body>
    <header>
        <h1>Foco & Estudo</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Métodos</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>

    <main class="conteudo">
        <h2>Fale Conosco</h2>
        <p>Tem alguma dúvida ou sugestão de tema? Envie uma mensagem!</p>
        
        <form action="#" method="POST" onsubmit="alert('Mensagem enviada com sucesso! (Simulação)')">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" required><br><br>
            
            <label for="email">E-mail:</label><br>
            <input type="email" id="email" required><br><br>
            
            <label for="msg">Mensagem:</label><br>
            <textarea id="msg" required></textarea><br><br>
            
            <button type="submit">Enviar</button>
        </form>
    </main>
