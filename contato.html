<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.GAME | Contato</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>SYS.GAME_HISTORY</h1>
        <nav>
            <ul>
                <li><a href="index.html">EVOLUÇÃO</a></li>
                <li><a href="sobre.html">COFRE DE CLÁSSICOS</a></li>
                <li><a href="contato.html" class="active">CONTATO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="terminal-container">
            <h2>Fale Conosco</h2>
            <p style="color: #ccc; margin-bottom: 30px; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;">
                Tem alguma dúvida, sugestão ou quer compartilhar qual jogo marcou a sua vida? Envie uma mensagem através do formulário abaixo.
            </p>
            
            <form action="#" method="POST" class="terminal-form" onsubmit="alert('Sua mensagem foi enviada com sucesso! Obrigado pelo contato.')">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" placeholder="Digite seu nome..." required>
                
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
                
                <button type="submit" class="btn-start">ENVIAR MENSAGEM</button>
            </form>
        </div>
    </main>

    <footer>
        <p>Desenvolvido por - <a href="https://github.com/viniciusbiancoloni" target="_blank" class="link-externo"><i>Vinicius Biancoloni</i></a> | <a href="https://github.com/andrewgonzaga" target="_blank" class="link-externo"><i>Andrew Gonzaga</i></a> | <a href="https://github.com/aendermuller" target="_blank" class="link-externo"><i>Aender Muller</i></a> - &copy; 2026</p>
    </footer>

</body>
